<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" font-family="system-ui,-apple-system,sans-serif">
<style>
  @keyframes show1 { 0%,2%{opacity:0} 4%,90%{opacity:1} 94%,100%{opacity:0} }
  @keyframes show2 { 0%,10%{opacity:0} 14%,90%{opacity:1} 94%,100%{opacity:0} }
  @keyframes show3 { 0%,22%{opacity:0} 26%,90%{opacity:1} 94%,100%{opacity:0} }
  @keyframes show4 { 0%,34%{opacity:0} 38%,90%{opacity:1} 94%,100%{opacity:0} }
  @keyframes show5 { 0%,46%{opacity:0} 50%,90%{opacity:1} 94%,100%{opacity:0} }
  @keyframes show6 { 0%,58%{opacity:0} 62%,90%{opacity:1} 94%,100%{opacity:0} }
  @keyframes sub2 { 0%,18%{opacity:0} 22%,90%{opacity:1} 94%,100%{opacity:0} }
  @keyframes sub3 { 0%,30%{opacity:0} 34%,90%{opacity:1} 94%,100%{opacity:0} }
  @keyframes sub4 { 0%,42%{opacity:0} 46%,90%{opacity:1} 94%,100%{opacity:0} }
  @keyframes sub5 { 0%,54%{opacity:0} 58%,90%{opacity:1} 94%,100%{opacity:0} }
  @keyframes dot1 { 0%,2%{fill:#101014;stroke:#3f3f46} 4%,8%{fill:#2563eb;stroke:#2563eb} 10%,90%{fill:#22c55e;stroke:#22c55e} 94%,100%{fill:#101014;stroke:#3f3f46} }
  @keyframes dot2 { 0%,10%{fill:#101014;stroke:#3f3f46} 14%,18%{fill:#2563eb;stroke:#2563eb} 22%,90%{fill:#22c55e;stroke:#22c55e} 94%,100%{fill:#101014;stroke:#3f3f46} }
  @keyframes dot3 { 0%,22%{fill:#101014;stroke:#3f3f46} 26%,30%{fill:#2563eb;stroke:#2563eb} 34%,90%{fill:#22c55e;stroke:#22c55e} 94%,100%{fill:#101014;stroke:#3f3f46} }
  @keyframes dot4 { 0%,34%{fill:#101014;stroke:#3f3f46} 38%,42%{fill:#2563eb;stroke:#2563eb} 46%,90%{fill:#22c55e;stroke:#22c55e} 94%,100%{fill:#101014;stroke:#3f3f46} }
  @keyframes dot5 { 0%,46%{fill:#101014;stroke:#3f3f46} 48%,54%{fill:#2563eb;stroke:#2563eb} 58%,90%{fill:#22c55e;stroke:#22c55e} 94%,100%{fill:#101014;stroke:#3f3f46} }
  @keyframes dot6 { 0%,58%{fill:#101014;stroke:#3f3f46} 62%,90%{fill:#dc2626;stroke:#dc2626} 94%,100%{fill:#101014;stroke:#3f3f46} }
  @keyframes rail { 0%,2%{stroke-dashoffset:370} 60%,90%{stroke-dashoffset:0} 94%,100%{stroke-dashoffset:370} }
  .s1{animation:show1 10s infinite}.s2{animation:show2 10s infinite}.s3{animation:show3 10s infinite}
  .s4{animation:show4 10s infinite}.s5{animation:show5 10s infinite}.s6{animation:show6 10s infinite}
  .r2{animation:sub2 10s infinite}.r3{animation:sub3 10s infinite}.r4{animation:sub4 10s infinite}.r5{animation:sub5 10s infinite}
  .d1{animation:dot1 10s infinite}.d2{animation:dot2 10s infinite}.d3{animation:dot3 10s infinite}
  .d4{animation:dot4 10s infinite}.d5{animation:dot5 10s infinite}.d6{animation:dot6 10s infinite}
</style>

<rect width="520" height="420" fill="#101014" rx="8"/>

<!-- Rail -->
<line x1="32" y1="25" x2="32" y2="395" stroke="#2e2e33" stroke-width="1" opacity="0.3"/>
<line x1="32" y1="25" x2="32" y2="395" stroke="#2563eb" stroke-width="1.5" opacity="0.6" stroke-dasharray="370" stroke-dashoffset="370" style="animation:rail 10s infinite"/>

<!-- Step 1 -->
<circle cx="32" cy="30" r="5" fill="#101014" stroke="#3f3f46" stroke-width="2" class="d1"/>
<g class="s1" opacity="0">
  <rect x="50" y="14" width="450" height="32" rx="6" fill="#1e1e22" stroke="#2e2e33" stroke-width="1"/>
  <text x="62" y="28" fill="#e4e4e7" font-size="12" font-weight="500">Alert: GPU thermal throttling on node-gpu-rack12-01</text>
  <text x="62" y="40" fill="#71717a" font-size="10">warning / gpu / rack-12</text>
</g>

<!-- Step 2 -->
<circle cx="32" cy="100" r="5" fill="#101014" stroke="#3f3f46" stroke-width="2" class="d2"/>
<g class="s2" opacity="0">
  <rect x="50" y="82" width="450" height="44" rx="6" fill="#1e1e22" stroke="#2e2e33" stroke-width="1"/>
  <text x="62" y="99" fill="#e4e4e7" font-size="12" font-weight="500">Checking recent alerts in rack-12</text>
  <text x="62" y="115" fill="#71717a" font-size="10" class="r2" opacity="0">Found 3 correlated alerts (thermal cascade)</text>
</g>

<!-- Step 3 -->
<circle cx="32" cy="172" r="5" fill="#101014" stroke="#3f3f46" stroke-width="2" class="d3"/>
<g class="s3" opacity="0">
  <rect x="50" y="154" width="450" height="44" rx="6" fill="#1e1e22" stroke="#2e2e33" stroke-width="1"/>
  <text x="62" y="171" fill="#e4e4e7" font-size="12" font-weight="500">Searching runbooks: GPU thermal throttling</text>
  <text x="62" y="187" fill="#71717a" font-size="10" class="r3" opacity="0">2 sections from gpu_thermal_throttling.md</text>
</g>

<!-- Step 4 -->
<circle cx="32" cy="244" r="5" fill="#101014" stroke="#3f3f46" stroke-width="2" class="d4"/>
<g class="s4" opacity="0">
  <rect x="50" y="226" width="450" height="44" rx="6" fill="#1e1e22" stroke="#2e2e33" stroke-width="1"/>
  <text x="62" y="243" fill="#e4e4e7" font-size="12" font-weight="500">Looking up node-gpu-rack12-01</text>
  <text x="62" y="259" fill="#71717a" font-size="10" class="r4" opacity="0">8x A100 80GB, healthy, 2104h uptime</text>
</g>

<!-- Step 5 -->
<circle cx="32" cy="316" r="5" fill="#101014" stroke="#3f3f46" stroke-width="2" class="d5"/>
<g class="s5" opacity="0">
  <rect x="50" y="298" width="450" height="44" rx="6" fill="#1e1e22" stroke="#2563eb" stroke-width="1.5"/>
  <text x="62" y="315" fill="#e4e4e7" font-size="12" font-weight="500">Creating incident: Thermal cascade in rack-12</text>
  <text x="62" y="331" fill="#71717a" font-size="10" class="r5" opacity="0">Created INC-A4EB2CFB (P1) — dc-ops-tokyo</text>
</g>

<!-- Step 6 -->
<circle cx="32" cy="388" r="5" fill="#101014" stroke="#3f3f46" stroke-width="2" class="d6"/>
<g class="s6" opacity="0">
  <rect x="50" y="370" width="450" height="32" rx="6" fill="#1e1e22" stroke="#dc2626" stroke-width="1.5"/>
  <text x="62" y="390" fill="#f87171" font-size="12" font-weight="500">Escalated via slack, pager — immediate</text>
</g>
</svg>
