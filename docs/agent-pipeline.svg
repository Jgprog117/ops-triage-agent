<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .bg { fill: #101014; }
    .card { fill: #1e1e22; rx: 6; }
    .line { stroke: #2e2e33; stroke-width: 1; }
    .title { fill: #e4e4e7; font-size: 12px; font-weight: 500; }
    .sub { fill: #71717a; font-size: 10px; }
  </style>

  <rect width="520" height="420" class="bg"/>

  <!-- Background rail -->
  <line x1="32" y1="25" x2="32" y2="395" class="line" opacity="0.3"/>

  <!-- Active rail (grows) -->
  <line x1="32" y1="25" x2="32" y2="25" stroke="#2563eb" stroke-width="1.5" opacity="0.7">
    <animate attributeName="y2" values="25;25;395;395;25" keyTimes="0;0.02;0.55;0.9;1" dur="10s" repeatCount="indefinite"/>
  </line>

  <!-- Step 1: Alert -->
  <g>
    <circle cx="32" cy="30" r="5" fill="#101014" stroke="#3f3f46" stroke-width="2">
      <animate attributeName="fill" values="#101014;#2563eb;#22c55e;#22c55e;#101014" keyTimes="0;0.03;0.1;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#3f3f46;#2563eb;#22c55e;#22c55e;#3f3f46" keyTimes="0;0.03;0.1;0.88;0.92" dur="10s" repeatCount="indefinite"/>
    </circle>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.02;0.06;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      <rect x="50" y="14" width="450" height="32" class="card" stroke="#2e2e33" stroke-width="1"/>
      <text x="62" y="28" class="title">Alert: GPU thermal throttling on node-gpu-rack12-01</text>
      <text x="62" y="40" class="sub">warning / gpu / rack-12</text>
    </g>
  </g>

  <!-- Step 2: Query alerts -->
  <g>
    <circle cx="32" cy="100" r="5" fill="#101014" stroke="#3f3f46" stroke-width="2">
      <animate attributeName="fill" values="#101014;#101014;#2563eb;#22c55e;#22c55e;#101014" keyTimes="0;0.1;0.12;0.2;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#3f3f46;#3f3f46;#2563eb;#22c55e;#22c55e;#3f3f46" keyTimes="0;0.1;0.12;0.2;0.88;0.92" dur="10s" repeatCount="indefinite"/>
    </circle>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1;0.14;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      <rect x="50" y="82" width="450" height="44" class="card" stroke="#2e2e33" stroke-width="1"/>
      <text x="62" y="99" class="title">Checking recent alerts in rack-12</text>
      <text x="62" y="115" class="sub" opacity="0">
        Found 3 correlated alerts (thermal cascade)
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.18;0.22;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- Step 3: Search runbooks -->
  <g>
    <circle cx="32" cy="172" r="5" fill="#101014" stroke="#3f3f46" stroke-width="2">
      <animate attributeName="fill" values="#101014;#101014;#2563eb;#22c55e;#22c55e;#101014" keyTimes="0;0.22;0.24;0.32;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#3f3f46;#3f3f46;#2563eb;#22c55e;#22c55e;#3f3f46" keyTimes="0;0.22;0.24;0.32;0.88;0.92" dur="10s" repeatCount="indefinite"/>
    </circle>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.22;0.26;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      <rect x="50" y="154" width="450" height="44" class="card" stroke="#2e2e33" stroke-width="1"/>
      <text x="62" y="171" class="title">Searching runbooks: GPU thermal throttling</text>
      <text x="62" y="187" class="sub" opacity="0">
        2 sections from gpu_thermal_throttling.md
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.30;0.34;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- Step 4: Look up host -->
  <g>
    <circle cx="32" cy="244" r="5" fill="#101014" stroke="#3f3f46" stroke-width="2">
      <animate attributeName="fill" values="#101014;#101014;#2563eb;#22c55e;#22c55e;#101014" keyTimes="0;0.34;0.36;0.44;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#3f3f46;#3f3f46;#2563eb;#22c55e;#22c55e;#3f3f46" keyTimes="0;0.34;0.36;0.44;0.88;0.92" dur="10s" repeatCount="indefinite"/>
    </circle>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.34;0.38;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      <rect x="50" y="226" width="450" height="44" class="card" stroke="#2e2e33" stroke-width="1"/>
      <text x="62" y="243" class="title">Looking up node-gpu-rack12-01</text>
      <text x="62" y="259" class="sub" opacity="0">
        8x A100 80GB, healthy, 2,104h uptime
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.42;0.46;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- Step 5: Create incident -->
  <g>
    <circle cx="32" cy="316" r="5" fill="#101014" stroke="#3f3f46" stroke-width="2">
      <animate attributeName="fill" values="#101014;#101014;#2563eb;#22c55e;#22c55e;#101014" keyTimes="0;0.46;0.48;0.56;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#3f3f46;#3f3f46;#2563eb;#22c55e;#22c55e;#3f3f46" keyTimes="0;0.46;0.48;0.56;0.88;0.92" dur="10s" repeatCount="indefinite"/>
    </circle>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.46;0.50;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      <rect x="50" y="298" width="450" height="44" class="card" stroke="#2563eb" stroke-width="1.5"/>
      <text x="62" y="315" class="title">Creating incident: Thermal cascade in rack-12</text>
      <text x="62" y="331" class="sub" opacity="0">
        Created INC-A4EB2CFB (P1) — assigned to dc-ops-tokyo
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.54;0.58;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- Step 6: Escalate -->
  <g>
    <circle cx="32" cy="388" r="5" fill="#101014" stroke="#3f3f46" stroke-width="2">
      <animate attributeName="fill" values="#101014;#101014;#dc2626;#dc2626;#101014" keyTimes="0;0.58;0.60;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#3f3f46;#3f3f46;#dc2626;#dc2626;#3f3f46" keyTimes="0;0.58;0.60;0.88;0.92" dur="10s" repeatCount="indefinite"/>
    </circle>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.58;0.62;0.88;0.92" dur="10s" repeatCount="indefinite"/>
      <rect x="50" y="370" width="450" height="32" class="card" stroke="#dc2626" stroke-width="1.5"/>
      <text x="62" y="390" class="title" style="fill: #f87171">Escalated via slack, pager — immediate urgency</text>
    </g>
  </g>
</svg>
